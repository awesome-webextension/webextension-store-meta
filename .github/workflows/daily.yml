name: Daily Store Health
on:
  schedule:
    - cron: "0 0 * * *"
jobs:
  store-health:
    name: Store health
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies 📦
        run: npm ci

      - name: Test 🧪
        run: npm run test

      - name: Source health 🩺
        if: ${{ matrix.node-version == 20 && !cancelled() }}
        run: npm run test:daily
